name: Screenshots

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: screenshots-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Determine affected routes
        id: routes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          PR_BODY=$(gh pr view "$PR_NUMBER" --json body -q .body)
          ROUTES=$(printf '%s' "$PR_BODY" \
            | awk '/<!-- AFFECTED_ROUTES -->/,/<!-- \/AFFECTED_ROUTES -->/' \
            | grep -E '^\s*-\s*' \
            | sed -E 's/^\s*-\s*//' \
            | grep -v '^none$' \
            | paste -sd ',' - || true)

          if [ -z "$ROUTES" ]; then
            git fetch origin "$BASE_REF" --depth=50 2>/dev/null || true
            ROUTES=$(git diff --name-only "origin/$BASE_REF...HEAD" \
              | grep -oE 'src/app/pages/[^/]+' \
              | awk -F/ '{print "/"$NF}' \
              | sort -u \
              | paste -sd ',' - || true)
          fi

          if [ -z "$ROUTES" ]; then
            ROUTES="/"
          fi

          echo "routes=$ROUTES" >> "$GITHUB_OUTPUT"
          echo "Affected routes: $ROUTES"

      - name: Extract linked issue number
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PR_BODY=$(gh pr view "$PR_NUMBER" --json body -q .body)
          ISSUE=$(printf '%s' "$PR_BODY" \
            | grep -ioE '(close[sd]?|fixe?[sd]?|resolve[sd]?)[[:space:]]*:?[[:space:]]*#[0-9]+' \
            | grep -oE '#[0-9]+' \
            | head -n1 \
            | tr -d '#' || true)
          echo "number=$ISSUE" >> "$GITHUB_OUTPUT"
          echo "Linked issue: ${ISSUE:-none}"

      - name: Build Angular (for stable serving)
        run: npm run build -- --base-href "/" --output-path=dist-screenshots

      - name: Serve build (SPA mode)
        run: |
          npx --yes serve@14 dist-screenshots/browser -l 4200 -s --no-clipboard --no-port-switching &
          npx wait-on http://localhost:4200 -t 60000

      - name: Capture screenshots
        env:
          AFFECTED_ROUTES: ${{ steps.routes.outputs.routes }}
        run: npx playwright test

      - name: List captured screenshots
        id: list
        run: |
          if [ ! -d screenshots ]; then
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          shopt -s nullglob
          png_files=(screenshots/*.png)
          if [ ${#png_files[@]} -eq 0 ]; then
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          basenames=$(printf '%s\n' "${png_files[@]}" | xargs -n1 basename | paste -sd ',' -)
          echo "files=$basenames" >> "$GITHUB_OUTPUT"
          echo "Captured: $basenames"
          ls -la screenshots/

      - name: Push screenshots to cache branch
        if: steps.list.outputs.files != ''
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          SAVE_DIR=$(mktemp -d)
          cp screenshots/*.png "$SAVE_DIR/"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git reset --hard HEAD
          git clean -fdx -e dist-screenshots -e node_modules

          if git ls-remote --exit-code --heads origin screenshots-store >/dev/null 2>&1; then
            git fetch origin screenshots-store
            git checkout screenshots-store
          else
            git checkout --orphan screenshots-store
            git rm -rf . 2>/dev/null || true
            git clean -fdx -e dist-screenshots -e node_modules
            echo "# Screenshots cache" > README.md
            git add README.md
            git commit -m "Init screenshots cache"
          fi

          rm -rf "pr-$PR_NUMBER"
          mkdir -p "pr-$PR_NUMBER"
          cp "$SAVE_DIR"/*.png "pr-$PR_NUMBER/"

          git add "pr-$PR_NUMBER"
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Screenshots for PR #$PR_NUMBER ($(date -u +%FT%TZ))"
            git push origin screenshots-store
          fi

      - name: Comment PR (and Issue) with screenshots
        if: steps.list.outputs.files != ''
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          FILES: ${{ steps.list.outputs.files }}
          REPO_FULL: ${{ github.repository }}
        with:
          script: |
            const files = process.env.FILES.split(',').filter(Boolean).sort();
            if (files.length === 0) {
              core.info('No screenshot files; skipping comment.');
              return;
            }

            const base = `https://raw.githubusercontent.com/${process.env.REPO_FULL}/screenshots-store/pr-${process.env.PR_NUMBER}`;
            const desktop = files.filter(f => f.startsWith('desktop_'));
            const mobile = files.filter(f => f.startsWith('mobile_'));
            const cb = Date.now();

            const renderRoute = (f) => {
              const route = f.replace(/^(desktop|mobile)_/, '').replace(/\.png$/, '').replace(/_/g, '/') || '/';
              const display = route.startsWith('/') ? route : '/' + route;
              return `\n**${display}**\n\n![${f}](${base}/${f}?v=${cb})\n`;
            };

            const section = (title, list) =>
              list.length === 0 ? '' : `\n### ${title}\n${list.map(renderRoute).join('')}`;

            const prLink = `https://github.com/${process.env.REPO_FULL}/pull/${process.env.PR_NUMBER}`;

            const prBody = [
              '## 📸 Screenshots',
              '_Updated automatically when this PR changes._',
              section('🖥️ Desktop (1440×900)', desktop),
              section('📱 Mobile (375×812)', mobile),
            ].join('\n');

            const issueBody = [
              '## 📸 Preview from PR',
              `_Generated by [PR #${process.env.PR_NUMBER}](${prLink}). Auto-updated._`,
              section('🖥️ Desktop (1440×900)', desktop),
              section('📱 Mobile (375×812)', mobile),
            ].join('\n');

            async function upsertComment(issueNumber, body, marker) {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: Number(issueNumber),
              });
              const existing = comments.find(c =>
                c.user && c.user.login === 'github-actions[bot]' &&
                typeof c.body === 'string' &&
                c.body.startsWith(marker)
              );
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
                core.info(`Updated comment ${existing.id} on #${issueNumber}`);
              } else {
                const { data: created } = await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: Number(issueNumber),
                  body,
                });
                core.info(`Created comment ${created.id} on #${issueNumber}`);
              }
            }

            await upsertComment(process.env.PR_NUMBER, prBody, '## 📸 Screenshots');

            const issueNum = process.env.ISSUE_NUMBER;
            if (issueNum && issueNum !== '' && issueNum !== process.env.PR_NUMBER) {
              try {
                await upsertComment(issueNum, issueBody, '## 📸 Preview from PR');
              } catch (e) {
                core.warning(`Could not post to issue #${issueNum}: ${e.message}`);
              }
            }

      - name: Upload artifact (debug fallback)
        if: always() && steps.list.outputs.files != ''
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-pr-${{ github.event.pull_request.number }}
          path: screenshots/
          retention-days: 14
